name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone iptv-nova assets
        run: |
          git clone --depth=1 https://github.com/JOX36/iptv-nova.git /tmp/iptv-nova
          mkdir -p app/src/main/assets/assets
          cp /tmp/iptv-nova/index.html   app/src/main/assets/
          cp /tmp/iptv-nova/app.js       app/src/main/assets/
          cp /tmp/iptv-nova/style.css    app/src/main/assets/
          cp /tmp/iptv-nova/manifest.json app/src/main/assets/
          cp /tmp/iptv-nova/sw.js        app/src/main/assets/
          cp -r /tmp/iptv-nova/assets/. app/src/main/assets/assets/ 2>/dev/null || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APK
        run: gradle assembleRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-nova-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "IPTV Nova v${{ github.run_number }}"
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
